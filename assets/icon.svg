<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#11103a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <clipPath id="card">
      <rect width="512" height="512" rx="72" ry="72"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="72" ry="72" fill="url(#bg)"/>

  <!-- Subtle top-left shine -->
  <ellipse cx="140" cy="100" rx="200" ry="120" fill="#ffffff" opacity="0.04" clip-path="url(#card)"/>

  <!-- Opening quotation mark (top-left, decorative) -->
  <text
    x="38" y="225"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="195" font-weight="700"
    fill="url(#accent)" opacity="0.88"
  >&#x201C;</text>

  <!-- Main "SK" initials -->
  <text
    x="256" y="332"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="196" font-weight="900"
    text-anchor="middle"
    fill="#ffffff"
    letter-spacing="-6"
  >SK</text>

  <!-- Accent bar beneath SK -->
  <rect x="118" y="352" width="276" height="6" rx="3" fill="url(#accent)" opacity="0.65"/>

  <!-- Closing quotation mark (bottom-right, decorative) -->
  <text
    x="360" y="480"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="130" font-weight="700"
    fill="url(#accent)" opacity="0.88"
  >&#x201D;</text>
</svg>
